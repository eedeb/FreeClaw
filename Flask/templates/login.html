<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>FreeClaw — Login</title>

  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="FreeClaw"/>
  <meta name="theme-color" content="#0d0d0f"/>

  <link rel="apple-touch-icon" href="https://freeclaw.eedeb.dev/eagle.png"/>
  <link rel="icon" href="https://freeclaw.eedeb.dev/eagle.png"/>

  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet"/>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0f;
      --surface: #141416;
      --border: #222228;
      --border-bright: #2e2e38;
      --accent: #c8f04a;
      --accent-dim: #a8cc38;
      --text: #e8e8ec;
      --muted: #666672;
      --error: #e05555;
      --mono: 'IBM Plex Mono', monospace;
      --sans: 'Syne', sans-serif;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      -webkit-tap-highlight-color: transparent;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.35;
      pointer-events: none;
      z-index: 0;
    }

    /* Subtle lime glow behind the card */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 60% 50% at 50% 60%, rgba(200,240,74,0.055) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .wrap {
      position: relative;
      z-index: 1;
      min-height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: calc(24px + var(--safe-top)) 24px calc(24px + var(--safe-bottom));
    }

    .card {
      width: 100%;
      max-width: 360px;
      background: var(--surface);
      border: 1px solid var(--border-bright);
      border-radius: 8px;
      overflow: hidden;
      animation: fadeUp 0.45s cubic-bezier(0.22,1,0.36,1) forwards;
      opacity: 0;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px) scale(0.98); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Card top accent line */
    .card-accent {
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0.6;
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 20px 24px 18px;
      border-bottom: 1px solid var(--border);
    }

    .header-icon {
      width: 36px; height: 36px;
      border-radius: 9px;
      overflow: hidden;
      flex-shrink: 0;
      border: 1px solid rgba(200,240,74,0.2);
    }
    .header-icon img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .header-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 7px var(--accent);
      animation: pulse 2.5s ease-in-out infinite;
      flex-shrink: 0;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 7px var(--accent); }
      50%       { opacity: 0.4; box-shadow: 0 0 3px var(--accent); }
    }

    .header-text { display: flex; flex-direction: column; gap: 2px; }
    .header-title {
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text);
    }
    .header-sub {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    .card-body {
      padding: 28px 24px 26px;
    }

    .prompt {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 22px;
      line-height: 1.7;
    }

    .input-wrap {
      position: relative;
      margin-bottom: 14px;
    }

    .input-wrap input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border-bright);
      border-radius: 5px;
      /* 16px to prevent iOS auto-zoom */
      padding: 13px 14px;
      font-family: var(--mono);
      font-size: 16px;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      letter-spacing: 0.08em;
      -webkit-appearance: none;
      appearance: none;
    }
    .input-wrap input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(200,240,74,0.08);
    }
    .input-wrap input.error-input {
      border-color: var(--error);
      box-shadow: 0 0 0 3px rgba(224,85,85,0.08);
    }

    .error-msg {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--error);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .error-msg::before { content: '✕'; font-size: 9px; }

    .submit-btn {
      width: 100%;
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: 5px;
      /* 48px tall — comfortable touch target */
      padding: 14px;
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      -webkit-user-select: none;
      user-select: none;
    }
    .submit-btn:hover  { background: var(--accent-dim); }
    .submit-btn:active { transform: scale(0.98); background: var(--accent-dim); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="card-accent"></div>
      <div class="card-header">
        <div class="header-icon">
          <img src="https://freeclaw.eedeb.dev/eagle.png" alt="FreeClaw"/>
        </div>
        <div class="header-dot"></div>
        <div class="header-text">
          <span class="header-title">FreeClaw</span>
          <span class="header-sub">an AI agent that doesn't burn your money</span>
        </div>
      </div>
      <div class="card-body">
        <p class="prompt">Enter your password to continue.</p>

        {% if error %}
        <div class="error-msg">Incorrect password. Try again.</div>
        {% endif %}

        <form method="POST" action="/login">
          <div class="input-wrap">
            <input
              type="password"
              name="password"
              placeholder="password"
              class="{{ 'error-input' if error else '' }}"
              autofocus
              autocomplete="current-password"
            />
          </div>
          <button type="submit" class="submit-btn">Unlock →</button>
        </form>
      </div>
    </div>
  </div>
</body>
</html>
