<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FreeClaw</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0f;
      --surface: #141416;
      --border: #222228;
      --accent: #c8f04a;
      --accent-dim: #a8cc38;
      --text: #e8e8ec;
      --muted: #666672;
      --user-bg: #1a1f10;
      --agent-bg: #141416;
      --radius: 4px;
      --mono: 'IBM Plex Mono', monospace;
      --sans: 'Syne', sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 15px;
    }

    /* Subtle grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.35;
      pointer-events: none;
      z-index: 0;
    }

    #app {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 860px;
      margin: 0 auto;
    }

    /* Header */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--border);
    }

    .header-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 10px var(--accent);
      animation: pulse 2.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 10px var(--accent); }
      50% { opacity: 0.5; box-shadow: 0 0 4px var(--accent); }
    }

    header h1 {
      font-family: var(--sans);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text);
    }

    .header-title { display: flex; flex-direction: column; gap: 2px; }
    .header-title h1 {
      font-family: var(--sans);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text);
    }
    .header-tagline {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.04em;
    }
    .header-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    header span {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
    }
    #reset-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--muted);
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 5px 10px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    #reset-btn:hover { border-color: rgba(192,57,57,0.4); color: #e05555; }
    #reset-btn:active { transform: scale(0.97); }

    /* Messages */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 2px;
      scroll-behavior: smooth;
    }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .message {
      display: flex;
      flex-direction: column;
      max-width: 78%;
      animation: fadeUp 0.25s ease forwards;
      opacity: 0;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .message.user { align-self: flex-end; align-items: flex-end; }
    .message.agent { align-self: flex-start; align-items: flex-start; }

    .msg-label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 5px;
      color: var(--muted);
    }

    .message.user .msg-label { color: var(--accent-dim); }

    .bubble {
      padding: 12px 16px;
      border-radius: var(--radius);
      line-height: 1.65;
      border: 1px solid var(--border);
    }

    .message.user .bubble {
      background: var(--user-bg);
      border-color: #2a3318;
      color: #d8f0a0;
    }

    .message.agent .bubble {
      background: var(--agent-bg);
      border-color: var(--border);
    }

    /* Markdown styles inside bubbles */
    .bubble p { margin-bottom: 0.6em; }
    .bubble p:last-child { margin-bottom: 0; }
    .bubble code {
      font-family: var(--mono);
      font-size: 0.85em;
      background: #1e1e24;
      border: 1px solid var(--border);
      padding: 1px 5px;
      border-radius: 3px;
      color: var(--accent);
    }
    .bubble pre {
      background: #0a0a0c;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
      overflow-x: auto;
      margin: 8px 0;
    }
    .bubble pre code {
      background: none;
      border: none;
      padding: 0;
      color: #c8e6a0;
      font-size: 0.83em;
    }
    .bubble ul, .bubble ol { padding-left: 20px; margin: 6px 0; }
    .bubble li { margin-bottom: 3px; }
    .bubble h1, .bubble h2, .bubble h3 {
      font-family: var(--sans);
      font-weight: 700;
      margin: 10px 0 5px;
      color: var(--accent);
    }
    .bubble h1 { font-size: 1.15em; }
    .bubble h2 { font-size: 1.05em; }
    .bubble h3 { font-size: 0.95em; }
    .bubble strong { color: #fff; font-weight: 600; }
    .bubble blockquote {
      border-left: 2px solid var(--accent);
      padding-left: 12px;
      color: var(--muted);
      margin: 6px 0;
    }
    .bubble a { color: var(--accent); text-decoration: underline; }

    /* Thinking indicator */
    .thinking .bubble {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 14px 16px;
    }

    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--muted);
      animation: blink 1.2s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0%, 80%, 100% { opacity: 0.2; transform: scale(0.85); }
      40% { opacity: 1; transform: scale(1); }
    }

    /* Empty state */
    #empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 13px;
      pointer-events: none;
    }

    #empty-state .big {
      font-size: 32px;
      opacity: 0.15;
      line-height: 1;
    }

    /* Input area */
    #input-area {
      padding: 16px 24px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    #user-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      padding: 11px 14px;
      resize: none;
      min-height: 44px;
      max-height: 160px;
      outline: none;
      transition: border-color 0.15s;
      line-height: 1.5;
    }

    #user-input:focus { border-color: #3a3a44; }
    #user-input::placeholder { color: var(--muted); }

    #send-btn {
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      width: 44px;
      height: 44px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, transform 0.1s;
    }

    #send-btn:hover { background: var(--accent-dim); }
    #send-btn:active { transform: scale(0.95); }
    #send-btn:disabled { background: #2a2a30; cursor: not-allowed; }

    #send-btn svg { width: 18px; height: 18px; }

    .hint {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      padding: 0 24px 8px;
      margin-top: -8px;
    }
  </style>
</head>
<body>
<div id="app">
  <header>
    <div class="header-dot"></div>
    <div class="header-title">
      <h1>FreeClaw</h1>
      <span class="header-tagline">an AI agent that doesn't burn your money</span>
    </div>
    <div class="header-right">
      <span id="msg-count">0 messages</span>
      <button id="reset-btn" title="Clear conversation">reset</button>
    </div>
  </header>

  <div id="messages">
    <div id="empty-state">
      <div class="big">🦅</div>
      <div>search the web, run bash, control smart home, write files…</div>
    </div>
  </div>

  <p class="hint">shift+enter for newline</p>
  <div id="input-area">
    <textarea id="user-input" placeholder="Ask anything — search, code, bash, smart home…" rows="1"></textarea>
    <button id="send-btn" title="Send">
      <svg viewBox="0 0 24 24" fill="none" stroke="#0d0d0f" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="19" x2="12" y2="5"/>
        <polyline points="5 12 12 5 19 12"/>
      </svg>
    </button>
  </div>
</div>

<script>
  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('user-input');
  const sendBtn    = document.getElementById('send-btn');
  const countEl   = document.getElementById('msg-count');
  const emptyEl   = document.getElementById('empty-state');

  const resetBtn   = document.getElementById('reset-btn');

  let msgCount = 0;
  let emptyRemoved = false;

  marked.setOptions({ breaks: true, gfm: true });

  function updateCount() {
    countEl.textContent = msgCount + (msgCount === 1 ? ' message' : ' messages');
  }

  function addMessage(role, text) {
    if (emptyEl) emptyEl.remove();
    msgCount++;
    updateCount();

    const wrap = document.createElement('div');
    wrap.className = `message ${role}`;

    const label = document.createElement('div');
    label.className = 'msg-label';
    label.textContent = role === 'user' ? 'you' : 'agent';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';

    if (role === 'agent') {
      bubble.innerHTML = marked.parse(text);
    } else {
      bubble.textContent = text;
    }

    wrap.appendChild(label);
    wrap.appendChild(bubble);
    messagesEl.appendChild(wrap);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return wrap;
  }

  function addThinking() {
    if (emptyEl) emptyEl.remove();
    const wrap = document.createElement('div');
    wrap.className = 'message agent thinking';

    const label = document.createElement('div');
    label.className = 'msg-label';
    label.textContent = 'agent';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';

    wrap.appendChild(label);
    wrap.appendChild(bubble);
    messagesEl.appendChild(wrap);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return wrap;
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;

    inputEl.value = '';
    inputEl.style.height = 'auto';
    sendBtn.disabled = true;

    addMessage('user', text);
    const thinking = addThinking();

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text })
      });

      const data = await res.json();
      thinking.remove();

      if (data.error) {
        addMessage('agent', `**Error:** ${data.error}`);
      } else {
        addMessage('agent', data.response);
      }
    } catch (err) {
      thinking.remove();
      addMessage('agent', `**Connection error.** Is the server running?`);
    }

    sendBtn.disabled = false;
    inputEl.focus();
  }

  sendBtn.addEventListener('click', sendMessage);

  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  resetBtn.addEventListener('click', async () => {
    try {
      await fetch('/reset', { method: 'POST' });
    } catch (_) {}
    messagesEl.innerHTML = '';
    msgCount = 0;
    updateCount();
    emptyRemoved = false;
    const empty = document.createElement('div');
    empty.id = 'empty-state';
    empty.innerHTML = '<div class="big">🦅</div><div>search the web, run bash, control smart home, write files…</div>';
    messagesEl.appendChild(empty);
  });


  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + 'px';
  });
</script>
</body>
</html>
