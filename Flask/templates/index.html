<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>FreeClaw</title>

  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="FreeClaw"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="theme-color" content="#0d0d0f"/>
  <meta name="description" content="An AI agent that doesn't burn your money."/>

  <link rel="apple-touch-icon" href="https://freeclaw.eedeb.dev/eagle.png"/>
  <link rel="icon" href="https://freeclaw.eedeb.dev/eagle.png"/>

  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0f;
      --surface: #141416;
      --border: #222228;
      --accent: #c8f04a;
      --accent-dim: #a8cc38;
      --text: #e8e8ec;
      --muted: #666672;
      --user-bg: #1a1f10;
      --agent-bg: #141416;
      --radius: 4px;
      --mono: 'IBM Plex Mono', monospace;
      --sans: 'Syne', sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 15px;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.35;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Full-screen app shell ── */
    #app {
      position: fixed;
      inset: 0;
      z-index: 1;
      display: flex;
      flex-direction: column;
      padding-top: env(safe-area-inset-top);
      /* No bottom padding here — handled in #input-area only */
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
      max-width: 860px;
      margin: 0 auto;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px 11px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      background: rgba(13,13,15,0.97);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      min-height: 52px;
    }

    .header-icon {
      width: 30px; height: 30px;
      border-radius: 7px;
      overflow: hidden;
      flex-shrink: 0;
      border: 1px solid rgba(200,240,74,0.2);
    }
    .header-icon img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .header-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      animation: pulse 2.5s ease-in-out infinite;
      flex-shrink: 0;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 8px var(--accent); }
      50% { opacity: 0.4; box-shadow: 0 0 3px var(--accent); }
    }

    .header-title {
      display: flex;
      flex-direction: column;
      gap: 1px;
      min-width: 0; /* allow text to truncate */
    }
    .header-title h1 {
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text);
      line-height: 1;
      white-space: nowrap;
    }
    .header-tagline {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--muted);
      letter-spacing: 0.03em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .header-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    #token-count {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      white-space: nowrap;
    }
    @media (max-width: 380px) { #token-count { display: none; } }

    #reset-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--muted);
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 7px 11px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
      -webkit-user-select: none;
      user-select: none;
      white-space: nowrap;
      flex-shrink: 0;
    }
    #reset-btn:active { border-color: rgba(192,57,57,0.5); color: #e05555; transform: scale(0.96); }

    /* ── Messages ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 18px 16px;
      display: flex;
      flex-direction: column;
      gap: 2px;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
    }

    #messages::-webkit-scrollbar { width: 3px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .message {
      display: flex;
      flex-direction: column;
      max-width: 88%;
      animation: fadeUp 0.22s ease forwards;
      opacity: 0;
    }
    @media (min-width: 600px) { .message { max-width: 78%; } }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .message.user  { align-self: flex-end;   align-items: flex-end; }
    .message.agent { align-self: flex-start; align-items: flex-start; }

    .msg-label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 5px;
      color: var(--muted);
    }
    .message.user .msg-label { color: var(--accent-dim); }

    .bubble {
      padding: 11px 14px;
      border-radius: var(--radius);
      line-height: 1.65;
      border: 1px solid var(--border);
      word-break: break-word;
      overflow-wrap: break-word;
    }
    .message.user .bubble  { background: var(--user-bg); border-color: #2a3318; color: #d8f0a0; }
    .message.agent .bubble { background: var(--agent-bg); border-color: var(--border); }

    /* Markdown */
    .bubble p { margin-bottom: 0.6em; }
    .bubble p:last-child { margin-bottom: 0; }
    .bubble code {
      font-family: var(--mono); font-size: 0.82em;
      background: #1e1e24; border: 1px solid var(--border);
      padding: 1px 5px; border-radius: 3px; color: var(--accent); word-break: break-all;
    }
    .bubble pre {
      background: #0a0a0c; border: 1px solid var(--border);
      border-radius: var(--radius); padding: 12px;
      overflow-x: auto; margin: 8px 0; -webkit-overflow-scrolling: touch;
    }
    .bubble pre code { background: none; border: none; padding: 0; color: #c8e6a0; font-size: 0.82em; word-break: normal; }
    .bubble ul, .bubble ol { padding-left: 20px; margin: 6px 0; }
    .bubble li { margin-bottom: 3px; }
    .bubble h1, .bubble h2, .bubble h3 { font-family: var(--sans); font-weight: 700; margin: 10px 0 5px; color: var(--accent); }
    .bubble h1 { font-size: 1.1em; } .bubble h2 { font-size: 1em; } .bubble h3 { font-size: 0.92em; }
    .bubble strong { color: #fff; font-weight: 600; }
    .bubble blockquote { border-left: 2px solid var(--accent); padding-left: 12px; color: var(--muted); margin: 6px 0; }
    .bubble a { color: var(--accent); text-decoration: underline; }

    /* Thinking dots */
    .thinking .bubble { display: flex; gap: 5px; align-items: center; padding: 14px 16px; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); animation: blink 1.2s ease-in-out infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink {
      0%, 80%, 100% { opacity: 0.2; transform: scale(0.85); }
      40% { opacity: 1; transform: scale(1); }
    }

    /* Empty state */
    #empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      pointer-events: none;
      text-align: center;
      padding: 0 32px;
    }
    #empty-state .eagle-wrap {
      width: 68px; height: 68px;
      border-radius: 16px;
      overflow: hidden;
      opacity: 0.2;
      border: 1px solid rgba(200,240,74,0.15);
    }
    #empty-state .eagle-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
    #empty-state .empty-name {
      font-family: var(--sans);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
      opacity: 0.45;
    }
    #empty-state .empty-sub {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      line-height: 1.9;
      opacity: 0.4;
    }

    /* ── Input area ── */
    #input-area {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-shrink: 0;
      padding: 12px 16px;
      /* In standalone PWA the safe-area-inset-bottom is ~34px which is way too much.
         We just need ~8-10px for the home indicator. Use a small fixed value. */
      padding-bottom: 10px;
      border-top: 1px solid var(--border);
      background: rgba(13,13,15,0.97);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    #user-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--sans);
      font-size: 16px; /* prevents iOS zoom */
      padding: 11px 14px;
      resize: none;
      min-height: 44px;
      max-height: 130px;
      outline: none;
      transition: border-color 0.15s;
      line-height: 1.5;
      -webkit-appearance: none;
      appearance: none;
    }
    #user-input:focus { border-color: #3a3a44; }
    #user-input::placeholder { color: var(--muted); }

    #send-btn {
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      width: 44px; height: 44px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, transform 0.1s;
      -webkit-user-select: none;
      user-select: none;
    }
    #send-btn:active { transform: scale(0.92); background: var(--accent-dim); }
    #send-btn:disabled { background: #2a2a30; cursor: not-allowed; }
    #send-btn svg { width: 18px; height: 18px; }

    /* ── PWA Splash ── */
    #splash {
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 9999;
      display: none; /* hidden by default, shown only in standalone via JS */
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      pointer-events: none;
    }
    #splash.visible { display: flex; }
    #splash.hide { animation: splashOut 0.35s ease forwards; }

    .splash-icon {
      width: 100px; height: 100px;
      border-radius: 24px;
      overflow: hidden;
      border: 1px solid rgba(200,240,74,0.25);
      box-shadow: 0 0 50px rgba(200,240,74,0.1);
      animation: splashIconIn 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards;
      opacity: 0;
    }
    .splash-icon img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .splash-name {
      font-family: var(--sans);
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      opacity: 0;
      animation: splashTextIn 0.4s ease 0.35s forwards;
    }
    .splash-sub {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.06em;
      opacity: 0;
      margin-top: -8px;
      animation: splashTextIn 0.4s ease 0.5s forwards;
    }

    @keyframes splashIconIn {
      from { opacity: 0; transform: scale(0.75) translateY(12px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }
    @keyframes splashTextIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes splashOut {
      from { opacity: 1; }
      to   { opacity: 0; visibility: hidden; }
    }
  </style>
</head>
<body>

<div id="splash">
  <div class="splash-icon"><img src="https://freeclaw.eedeb.dev/eagle.png" alt="FreeClaw"/></div>
  <div class="splash-name">FreeClaw</div>
  <div class="splash-sub">an AI agent that doesn't burn your money</div>
</div>

<div id="app">
  <header>
    <div class="header-icon">
      <img src="https://freeclaw.eedeb.dev/eagle.png" alt="FreeClaw"/>
    </div>
    <div class="header-dot"></div>
    <div class="header-title">
      <h1>FreeClaw</h1>
      <span class="header-tagline">an AI agent that doesn't burn your money</span>
    </div>
    <div class="header-right">
      <span id="token-count">~0 tokens</span>
      <button id="reset-btn">reset</button>
    </div>
  </header>

  <div id="messages">
    <div id="empty-state">
      <div class="eagle-wrap"><img src="https://freeclaw.eedeb.dev/eagle.png" alt=""/></div>
      <div class="empty-name">FreeClaw</div>
      <div class="empty-sub">search the web · run bash<br>control smart home · write files</div>
    </div>
  </div>

  <div id="input-area">
    <textarea id="user-input" placeholder="Ask anything…" rows="1"></textarea>
    <button id="send-btn" title="Send">
      <svg viewBox="0 0 24 24" fill="none" stroke="#0d0d0f" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="19" x2="12" y2="5"/>
        <polyline points="5 12 12 5 19 12"/>
      </svg>
    </button>
  </div>
</div>

<script>
  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('user-input');
  const sendBtn    = document.getElementById('send-btn');
  const countEl    = document.getElementById('token-count');
  const resetBtn   = document.getElementById('reset-btn');
  const splash     = document.getElementById('splash');

  // Show splash only when running as installed PWA
  const isStandalone = window.navigator.standalone === true
    || window.matchMedia('(display-mode: standalone)').matches;

  if (isStandalone) {
    splash.classList.add('visible');
    setTimeout(() => splash.classList.add('hide'), 1100);
  }

  let totalTokens = 0;
  const estimate = str => Math.ceil(str.length / 4);
  marked.setOptions({ breaks: true, gfm: true });

  function updateCount() {
    countEl.textContent = '~' + totalTokens.toLocaleString() + ' tokens';
  }

  function removeEmpty() {
    const el = document.getElementById('empty-state');
    if (el) el.remove();
  }

  function addMessage(role, text) {
    removeEmpty();
    totalTokens += estimate(text);
    updateCount();
    const wrap = document.createElement('div');
    wrap.className = `message ${role}`;
    const label = document.createElement('div');
    label.className = 'msg-label';
    label.textContent = role === 'user' ? 'you' : 'agent';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = role === 'agent' ? marked.parse(text) : '';
    if (role !== 'agent') bubble.textContent = text;
    wrap.appendChild(label);
    wrap.appendChild(bubble);
    messagesEl.appendChild(wrap);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return wrap;
  }

  function addThinking() {
    removeEmpty();
    const wrap = document.createElement('div');
    wrap.className = 'message agent thinking';
    const label = document.createElement('div');
    label.className = 'msg-label';
    label.textContent = 'agent';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
    wrap.appendChild(label);
    wrap.appendChild(bubble);
    messagesEl.appendChild(wrap);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return wrap;
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;
    inputEl.value = '';
    inputEl.style.height = 'auto';
    sendBtn.disabled = true;
    inputEl.blur();
    addMessage('user', text);
    const thinking = addThinking();
    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text })
      });
      const data = await res.json();
      thinking.remove();
      addMessage('agent', data.error ? `**Error:** ${data.error}` : data.response);
    } catch {
      thinking.remove();
      addMessage('agent', '**Connection error.** Is the server running?');
    }
    sendBtn.disabled = false;
    if (!isStandalone) inputEl.focus();
  }

  sendBtn.addEventListener('click', sendMessage);
  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 130) + 'px';
  });

  resetBtn.addEventListener('click', async () => {
    try { await fetch('/reset', { method: 'POST' }); } catch (_) {}
    messagesEl.innerHTML = '';
    totalTokens = 0;
    updateCount();
    const empty = document.createElement('div');
    empty.id = 'empty-state';
    empty.innerHTML = `
      <div class="eagle-wrap"><img src="https://freeclaw.eedeb.dev/eagle.png" alt=""/></div>
      <div class="empty-name">FreeClaw</div>
      <div class="empty-sub">search the web · run bash<br>control smart home · write files</div>`;
    messagesEl.appendChild(empty);
  });

  // Keep messages scrolled when iOS keyboard resizes the viewport
  if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', () => {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    });
  }
</script>
</body>
</html>
