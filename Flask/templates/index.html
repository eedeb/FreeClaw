<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>FreeClaw</title>

  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="FreeClaw"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="theme-color" content="#0d0d0f"/>
  <meta name="description" content="An AI agent that doesn't burn your money."/>

  <link rel="apple-touch-icon" href="https://freeclaw.eedeb.dev/eagle.png"/>
  <link rel="icon" href="https://freeclaw.eedeb.dev/eagle.png"/>

  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet"/>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0f;
      --surface: #141416;
      --border: #222228;
      --accent: #c8f04a;
      --accent-dim: #a8cc38;
      --text: #e8e8ec;
      --muted: #666672;
      --radius: 4px;
      --mono: 'IBM Plex Mono', monospace;
      --sans: 'Syne', sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 15px;
      -webkit-tap-highlight-color: transparent;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.35;
      pointer-events: none;
      z-index: 0;
    }

    #app {
      position: relative;
      z-index: 1;
      max-width: 640px;
      margin: 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) 24px env(safe-area-inset-left);
    }

    header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 18px 16px 14px;
      border-bottom: 1px solid var(--border);
      background: rgba(13,13,15,0.97);
      backdrop-filter: blur(16px);
    }
    .header-icon { width: 30px; height: 30px; border-radius: 7px; overflow: hidden; border: 1px solid rgba(200,240,74,0.2); flex-shrink: 0; }
    .header-icon img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .header-title h1 {
      font-size: 13px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; line-height: 1;
    }
    .header-tagline { font-family: var(--mono); font-size: 9px; color: var(--muted); letter-spacing: 0.03em; }
    header a#logout-link {
      margin-left: auto;
      font-family: var(--mono); font-size: 10px; color: var(--muted); text-decoration: none;
      border: 1px solid var(--border); border-radius: var(--radius); padding: 6px 10px;
    }

    /* ── API toggle chip ── */
    #api-toggle-btn {
      display: flex; align-items: center; gap: 5px;
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--muted);
      font-family: var(--mono); font-size: 10px;
      padding: 6px 10px;
      cursor: pointer;
      flex-shrink: 0;
      transition: border-color 0.15s, color 0.15s;
    }
    #api-toggle-btn.enabled { border-color: rgba(200,240,74,0.35); color: var(--accent); }
    .api-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); flex-shrink: 0; transition: background 0.15s; }
    #api-toggle-btn.enabled .api-dot { background: var(--accent); }

    main { padding: 18px 16px 40px; }

    .section-label {
      font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--muted); margin: 22px 0 10px;
    }
    .section-label:first-child { margin-top: 0; }

    /* ── Users grid ── */
    #users-grid { display: flex; flex-direction: column; gap: 8px; }

    .user-card {
      display: flex; align-items: center; gap: 12px;
      padding: 13px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      cursor: pointer;
      transition: border-color 0.15s, transform 0.1s;
    }
    .user-card:active { transform: scale(0.99); }
    .user-card.selected { border-color: var(--accent-dim); }
    .user-avatar {
      width: 34px; height: 34px; border-radius: 50%;
      background: #1a1f10; border: 1px solid #2a3318; color: var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--mono); font-weight: 600; font-size: 13px; flex-shrink: 0;
    }
    .user-info { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
    .user-name { font-size: 14px; font-weight: 600; }
    .user-meta { font-family: var(--mono); font-size: 10px; color: var(--muted); }
    .user-card .chevron { margin-left: auto; color: var(--muted); font-size: 12px; flex-shrink: 0; }

    .user-delete-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--muted);
      font-family: var(--mono);
      font-size: 10px;
      padding: 5px 8px;
      cursor: pointer;
      flex-shrink: 0;
      transition: border-color 0.15s, color 0.15s;
    }
    .user-delete-btn:active { transform: scale(0.95); }
    .user-delete-btn.confirm { border-color: rgba(224,85,85,0.5); color: #e05555; }

    #add-user-card {
      display: flex; align-items: center; gap: 10px;
      padding: 13px 14px;
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--muted);
      cursor: pointer;
      font-family: var(--mono); font-size: 12px; letter-spacing: 0.04em;
    }
    #add-user-card:active { border-color: var(--accent-dim); color: var(--accent); }

    #add-user-form {
      display: none;
      gap: 8px;
      margin-top: 8px;
    }
    #add-user-form.visible { display: flex; }
    #add-user-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      padding: 10px 12px;
      outline: none;
    }
    #add-user-input:focus { border-color: var(--accent-dim); }
    #add-user-submit {
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      color: #0d0d0f;
      font-weight: 700;
      font-size: 12px;
      padding: 0 16px;
      cursor: pointer;
    }
    #user-form-error { font-family: var(--mono); font-size: 11px; color: #e05555; margin-top: 6px; display: none; }

    .empty-hint {
      font-family: var(--mono); font-size: 11px; color: var(--muted);
      text-align: center; padding: 20px 0;
    }

    /* ── Settings panel ── */
    #settings-toggle {
      display: flex; align-items: center; gap: 8px;
      font-family: var(--mono); font-size: 10px; color: var(--muted);
      cursor: pointer; user-select: none;
      margin: 28px 0 0;
      padding: 10px 0 10px;
      border-top: 1px solid var(--border);
    }
    #settings-toggle .caret { transition: transform 0.2s; font-size: 10px; }
    #settings-toggle.open .caret { transform: rotate(90deg); }

    #settings-panel { display: none; }
    #settings-panel.visible { display: block; }

    .setting-row {
      display: flex; flex-direction: column; gap: 4px;
      margin-bottom: 12px;
    }
    .setting-label {
      font-family: var(--mono); font-size: 10px; color: var(--muted); letter-spacing: 0.06em;
    }
    .setting-input-wrap { display: flex; gap: 6px; }
    .setting-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--mono);
      font-size: 12px;
      padding: 8px 10px;
      outline: none;
    }
    .setting-input:focus { border-color: var(--accent-dim); }
    .setting-reveal {
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--muted);
      font-family: var(--mono);
      font-size: 10px;
      padding: 0 8px;
      cursor: pointer;
      flex-shrink: 0;
    }
    #settings-save {
      width: 100%;
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      color: #0d0d0f;
      font-weight: 700;
      font-size: 12px;
      padding: 11px;
      cursor: pointer;
      margin-top: 4px;
    }
    #settings-save:active { transform: scale(0.98); }
    #settings-save:disabled { opacity: 0.5; cursor: not-allowed; }
    #settings-msg {
      font-family: var(--mono); font-size: 11px;
      margin-top: 8px; display: none; text-align: center;
    }
    #settings-msg.ok  { color: var(--accent); }
    #settings-msg.err { color: #e05555; }
  </style>
</head>
<body>
<div id="app">
  <header>
    <div class="header-icon"><img src="https://freeclaw.eedeb.dev/eagle.png" alt="FreeClaw"/></div>
    <div class="header-title">
      <h1>FreeClaw</h1>
      <div class="header-tagline">pick a user</div>
    </div>
    <button id="api-toggle-btn" type="button" title="Toggle OpenAI-compatible API">
      <span class="api-dot"></span>API
    </button>
    <a id="logout-link" href="/logout">log out</a>
  </header>

  <main>
    <div class="section-label">Users</div>
    <div id="users-error" class="empty-hint" style="display:none; color:#e05555;"></div>
    <div id="users-grid"></div>

    <div id="add-user-card">+ Add a new user</div>
    <div id="add-user-form">
      <input id="add-user-input" placeholder="Name, e.g. Elliot" maxlength="40"/>
      <button id="add-user-submit">Create</button>
    </div>
    <div id="user-form-error"></div>

    <div id="settings-toggle">
      <span class="caret">›</span> Settings
    </div>
    <div id="settings-panel">
      <div id="settings-fields"></div>
      <button id="settings-save">Save</button>
      <div id="settings-msg"></div>
    </div>
  </main>
</div>

<script>
  const usersGrid       = document.getElementById('users-grid');
  const usersError      = document.getElementById('users-error');
  const addUserCard     = document.getElementById('add-user-card');
  const addUserForm     = document.getElementById('add-user-form');
  const addUserInput    = document.getElementById('add-user-input');
  const addUserSubmit   = document.getElementById('add-user-submit');
  const userFormError   = document.getElementById('user-form-error');

  function escapeHtml(s) {
    return (s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function initials(name) {
    return (name || '?').trim().slice(0, 2).toUpperCase();
  }

  async function loadUsers() {
    usersError.style.display = 'none';
    let data;
    try {
      const res = await fetch('/api/users');
      data = await res.json();
      if (!res.ok) throw new Error(data.error || `Server returned ${res.status}`);
    } catch (e) {
      usersError.textContent = `Couldn't load users: ${e.message}`;
      usersError.style.display = 'block';
      usersGrid.innerHTML = '';
      return;
    }
    usersGrid.innerHTML = '';
    if ((data.users || []).length === 0) {
      usersGrid.innerHTML = `<div class="empty-hint">No users yet — add one below.${data.static_dir ? ' (looking in ' + escapeHtml(data.static_dir) + ')' : ''}</div>`;
    }
    (data.users || []).forEach(u => {
      const card = document.createElement('div');
      card.className = 'user-card';
      card.innerHTML = `
        <div class="user-avatar">${escapeHtml(initials(u.name))}</div>
        <div class="user-info">
          <div class="user-name">${escapeHtml(u.name)}</div>
        </div>
        <button class="user-delete-btn" type="button">delete</button>
        <div class="chevron">›</div>`;
      card.addEventListener('click', () => openUser(u.name));

      const delBtn = card.querySelector('.user-delete-btn');
      delBtn.addEventListener('click', (e) => {
        e.stopPropagation(); // don't trigger selectUser
        if (!delBtn.classList.contains('confirm')) {
          delBtn.classList.add('confirm');
          delBtn.textContent = 'confirm?';
          // Revert back to "delete" if they don't follow through
          setTimeout(() => {
            if (delBtn.classList.contains('confirm')) {
              delBtn.classList.remove('confirm');
              delBtn.textContent = 'delete';
            }
          }, 3000);
          return;
        }
        deleteUser(u.name, card);
      });

      usersGrid.appendChild(card);
    });
  }

  async function deleteUser(name, cardEl) {
    try {
      const res = await fetch(`/api/users/${encodeURIComponent(name)}`, { method: 'DELETE' });
      if (!res.ok) return;
      cardEl.remove();
    } catch (_) { /* ignore */ }
  }

  function openUser(name) {
    window.location.href = `/chat?user=${encodeURIComponent(name)}`;
  }

  addUserCard.addEventListener('click', () => {
    addUserForm.classList.add('visible');
    addUserCard.style.display = 'none';
    addUserInput.focus();
  });

  async function submitNewUser() {
    const name = addUserInput.value.trim();
    userFormError.style.display = 'none';
    if (!name) return;
    addUserSubmit.disabled = true;
    try {
      const res = await fetch('/api/users', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name })
      });
      let data;
      try {
        data = await res.json();
      } catch {
        throw new Error(`Server returned ${res.status} (non-JSON response)`);
      }
      if (!res.ok) {
        userFormError.textContent = data.error || `Could not create user (${res.status}).`;
        userFormError.style.display = 'block';
        return;
      }
      addUserInput.value = '';
      addUserForm.classList.remove('visible');
      addUserCard.style.display = 'flex';
      await loadUsers();
    } catch (e) {
      userFormError.textContent = e.message || 'Connection error.';
      userFormError.style.display = 'block';
    } finally {
      addUserSubmit.disabled = false;
    }
  }

  addUserSubmit.addEventListener('click', submitNewUser);
  addUserInput.addEventListener('keydown', e => { if (e.key === 'Enter') submitNewUser(); });

  // ── API toggle ──
  const apiToggleBtn = document.getElementById('api-toggle-btn');

  async function loadApiStatus() {
    try {
      const res = await fetch('/api/api-status');
      const data = await res.json();
      setApiToggleState(data.enabled);
    } catch (_) {}
  }

  function setApiToggleState(enabled) {
    apiToggleBtn.classList.toggle('enabled', enabled);
    apiToggleBtn.title = enabled ? 'API enabled — click to disable' : 'API disabled — click to enable';
  }

  apiToggleBtn.addEventListener('click', async () => {
    const enabling = !apiToggleBtn.classList.contains('enabled');
    try {
      const res = await fetch('/api/api-status', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ enabled: enabling })
      });
      const data = await res.json();
      setApiToggleState(data.enabled);
    } catch (_) {}
  });

  loadApiStatus();

  // ── Settings ──
  const settingsToggle = document.getElementById('settings-toggle');
  const settingsPanel  = document.getElementById('settings-panel');
  const settingsFields = document.getElementById('settings-fields');
  const settingsSave   = document.getElementById('settings-save');
  const settingsMsg    = document.getElementById('settings-msg');

  let settingsLoaded = false;

  settingsToggle.addEventListener('click', async () => {
    const open = settingsToggle.classList.toggle('open');
    settingsPanel.classList.toggle('visible', open);
    if (open && !settingsLoaded) {
      await loadSettings();
    }
  });

  async function loadSettings() {
    settingsFields.innerHTML = '<div class="empty-hint">loading…</div>';
    try {
      const res = await fetch('/api/settings');
      const data = await res.json();
      settingsFields.innerHTML = '';
      (data.settings || []).forEach(s => {
        const row = document.createElement('div');
        row.className = 'setting-row';
        const inputType = s.secret ? 'password' : 'text';
        row.innerHTML = `
          <div class="setting-label">${escapeHtml(s.label)} <span style="opacity:.4">(${escapeHtml(s.key)})</span></div>
          <div class="setting-input-wrap">
            <input class="setting-input" type="${inputType}" data-key="${escapeHtml(s.key)}" value="${escapeHtml(s.value)}" autocomplete="off" spellcheck="false"/>
            ${s.secret ? `<button class="setting-reveal" type="button" data-showing="false">show</button>` : ''}
          </div>`;
        if (s.secret) {
          const btn = row.querySelector('.setting-reveal');
          const inp = row.querySelector('.setting-input');
          btn.addEventListener('click', () => {
            const showing = btn.dataset.showing === 'true';
            inp.type = showing ? 'password' : 'text';
            btn.textContent = showing ? 'show' : 'hide';
            btn.dataset.showing = String(!showing);
          });
        }
        settingsFields.appendChild(row);
      });
      settingsLoaded = true;
    } catch (e) {
      settingsFields.innerHTML = `<div class="empty-hint" style="color:#e05555">Failed to load settings: ${escapeHtml(e.message)}</div>`;
    }
  }

  settingsSave.addEventListener('click', async () => {
    settingsSave.disabled = true;
    settingsMsg.style.display = 'none';
    const inputs = settingsFields.querySelectorAll('.setting-input');
    const payload = {};
    inputs.forEach(inp => { payload[inp.dataset.key] = inp.value; });
    try {
      const res = await fetch('/api/settings', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || `Error ${res.status}`);
      settingsMsg.textContent = 'Saved. Restart the server for changes to take effect.';
      settingsMsg.className = 'ok';
    } catch (e) {
      settingsMsg.textContent = e.message;
      settingsMsg.className = 'err';
    } finally {
      settingsMsg.style.display = 'block';
      settingsSave.disabled = false;
    }
  });

  loadUsers();
</script>
</body>
</html>
